name: Deploy

# Deploy to the production server on every v* tag. Tags can only be pushed by
# maintainers, and GitHub never exposes secrets to fork/PR workflows, so an
# outside contributor can never trigger a deploy on this public repo.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            "set -e; cd /srv/tally && git fetch --tags --prune --force origin && git checkout --force '${{ github.ref_name }}' && bash bin/deploy.sh"
