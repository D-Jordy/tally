server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Docker's embedded DNS, so the app upstream is re-resolved at request time.
    # Without this nginx caches the app container's IP at startup and 502s after
    # a redeploy recreates the app container with a new IP.
    resolver 127.0.0.11 valid=10s;

    location ~ \.php$ {
        set $upstream tally-app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 20M;
}
