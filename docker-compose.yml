services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - vite_build:/var/www/html/public/build
    env_file: .env
    # Project-unique DNS alias: `web` also sits on the shared external `stack`/`web`
    # network where every Laravel project exposes a generic `app` service, so
    # `fastcgi_pass app:9000` round-robins to foreign FPMs. nginx targets this instead.
    networks:
      default:
        aliases:
          - tally-app
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - vite_build:/var/www/html/public/build
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-portfolio}
      POSTGRES_USER: ${DB_USERNAME:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  vite_build:
